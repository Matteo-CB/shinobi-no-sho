# Alembic config Phase 4 (4.2) Shinobi no Sho.
#
# Particularite : 1 base SQLite par save (data/saves/<save_id>/state.sqlite),
# pas une DB centrale. Alembic est utilise ici pour :
# - tracker les revisions du schema (versions/)
# - generer le diff vs schema.sql actuel
# - upgrader UNE save donnee (sqlalchemy.url passe au runtime via env.py)
#
# Usage typique :
#   alembic -c src/shinobi/persistence/alembic.ini -x save_id=<id> upgrade head
#
# Le param `-x save_id=<id>` est lu par env.py pour cibler la bonne SQLite.

[alembic]
script_location = %(here)s/migrations
prepend_sys_path = .
path_separator = os
version_path_separator = os
sqlalchemy.url = sqlite:///placeholder.sqlite

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
