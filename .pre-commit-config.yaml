# Pre-commit hooks pour Shinobi no Sho.
#
# Installation :
#     pip install pre-commit
#     pre-commit install
#
# Verification manuelle :
#     pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: i18n-lint
        name: i18n catalog parity
        entry: python scripts/i18n_lint.py --quiet
        language: system
        pass_filenames: false
        files: ^data/i18n/.*\.json$
        description: |
          Verifie que tous les catalogues i18n (en.json, fr.json, ...) ont
          les memes cles que en.json (canonical). Refuse le commit si un
          catalogue diverge. Run `python scripts/i18n_lint.py` pour voir
          le rapport detaille.

      - id: i18n-extract-new
        name: i18n no-orphan keys
        entry: python scripts/i18n_extract_new_strings.py --quiet
        language: system
        pass_filenames: false
        files: ^src/shinobi/.*\.py$
        description: |
          Detecte les nouvelles cles `t("...")` ajoutees dans le code mais
          absentes du catalogue en.json. Si detection : run
          `python scripts/i18n_translate_new.py` pour les traduire.
